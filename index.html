<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ScentFinder — Comparateur de Parfums de Prestige</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bx:#6B1A2A;--bxd:#4a0f1c;--bxl:#8B2438;
  --or:#C9A84C;--orl:#e8d5a3;
  --cr:#fdf8f2;--crd:#f5ede0;
}
body{font-family:'DM Sans',sans-serif;background:var(--cr);color:var(--bx);}

/* ═══ NAVIGATION ═══ */
.nav{background:var(--cr);border-bottom:0.5px solid var(--orl);padding:0.8rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo-wrap{display:flex;align-items:center;gap:0.85rem;cursor:pointer;}
.logo-oval{width:48px;height:58px;border:1px solid var(--bx);border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--cr);}
.ls{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--bx);}
.lf{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;color:var(--or);}
.logo-text .ln{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--bx);letter-spacing:4px;}
.logo-text .lt{font-size:8px;color:var(--or);letter-spacing:3px;}
.nav-links{display:flex;gap:0.4rem;}
.nav-btn{background:transparent;border:0.5px solid var(--orl);color:var(--bx);padding:0.4rem 1rem;border-radius:50px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;letter-spacing:1px;}
.nav-btn:hover,.nav-btn.active{background:var(--bx);color:var(--or);border-color:var(--bx);}

/* ═══ PAGES ═══ */
.page{display:none;}
.page.active{display:block;}

/* ═══ ACCUEIL ═══ */
.hero{background:var(--bxd);padding:3rem 2rem;display:flex;flex-direction:column;align-items:center;gap:1rem;text-align:center;}
.hero-eyebrow{font-size:9px;color:var(--or);letter-spacing:5px;}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:400;color:var(--cr);line-height:1.2;}
.hero-title em{color:var(--or);font-style:italic;}
.hero-divider{display:flex;align-items:center;gap:10px;width:180px;}
.hero-divider span{flex:1;height:0.5px;background:var(--or);opacity:0.4;}
.hero-sub{font-size:12px;color:#a08070;letter-spacing:2px;}
.search-wrap{display:flex;align-items:center;gap:8px;background:transparent;border:0.5px solid var(--or);border-radius:50px;padding:0.65rem 1.4rem;width:100%;max-width:480px;}
.search-wrap input{background:transparent;border:none;outline:none;color:var(--cr);font-size:13px;flex:1;font-family:'DM Sans',sans-serif;}
.search-wrap input::placeholder{color:#7a5a60;}
.search-wrap i{color:var(--or);font-size:16px;}

.section-hd{display:flex;justify-content:space-between;align-items:center;padding:1.2rem 2rem 0.6rem;}
.section-hd h2{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;color:var(--bx);}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:1rem;padding:0 2rem;}
.card{background:var(--cr);border:0.5px solid var(--orl);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform 0.15s;}
.card:hover{transform:translateY(-3px);}
.card-img{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:3rem;background:var(--crd);position:relative;}
.card-body{padding:0.8rem;}
.card-brand{font-size:10px;color:var(--or);letter-spacing:2px;text-transform:uppercase;}
.card-name{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:600;color:var(--bx);margin-top:2px;}
.prices{margin-top:8px;border-top:0.5px solid var(--orl);padding-top:8px;}
.price-row{display:flex;justify-content:space-between;align-items:center;}
.price-best{font-size:13px;font-weight:500;color:var(--bx);}

/* ═══ FOOTER ═══ */
.footer{background:var(--bxd);padding:1.5rem 2rem;margin-top:2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;border-top:1px solid var(--or);}
.footer-logo{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--or);letter-spacing:4px;}
.footer-links{display:flex;gap:1.5rem;align-items:center;}
.footer-links a{font-size:11px;color:#FFFFFF !important;text-decoration:none;letter-spacing:1px;}
.footer-links a:hover{color:var(--or) !important;}

/* ═══ ÉQUIPE ═══ */
.membre-card{background:var(--cr);border:0.5px solid var(--orl);border-radius:12px;padding:1.5rem;text-align:center;margin: 2rem auto;max-width:250px;}
.membre-avatar{width:60px;height:60px;border-radius:50%;background:var(--bxd);margin:0 auto 10px;display:flex;align-items:center;justify-content:center;color:var(--or);font-weight:bold;}
</style>
</head>
<body>

<nav class="nav">
  <div class="logo-wrap" onclick="showPage('accueil')">
    <div class="logo-oval"><span class="ls">S</span><span class="lf">F</span></div>
    <div class="logo-text"><div class="ln">SCENTFINDER</div><div class="lt">COMPARATEUR DE PARFUMS</div></div>
  </div>
  <div class="nav-links">
    <button class="nav-btn active" onclick="showPage('accueil')">Accueil</button>
    <button class="nav-btn" onclick="showPage('apropos')">À propos</button>
  </div>
</nav>

<!-- PAGE ACCUEIL -->
<div id="page-accueil" class="page active">
  <div class="hero">
    <div class="hero-title">Le meilleur prix pour<br>votre <em>parfum de prestige</em></div>
    <div class="search-wrap">
      <i class="ti ti-search"></i>
      <input type="text" placeholder="Rechercher un parfum..."/>
    </div>
  </div>

  <div class="section-hd">
    <h2>Nos Parfums</h2>
  </div>

  <!-- GRILLE DES PRODUITS (Tes produits restent ici) -->
  <div class="grid">
    <div class="card">
      <div class="card-img">🧴</div>
      <div class="card-body">
        <div class="card-brand">DIOR</div>
        <div class="card-name">Sauvage</div>
        <div class="prices"><div class="price-row"><span class="price-best">89,00 €</span></div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-img">✨</div>
      <div class="card-body">
        <div class="card-brand">CHANEL</div>
        <div class="card-name">N°5</div>
        <div class="prices"><div class="price-row"><span class="price-best">120,00 €</span></div></div>
      </div>
    </div>
    <!-- Ajoute tes autres produits ici -->
  </div>

  <div class="footer">
    <div class="footer-logo">✦ SCENTFINDER</div>
    <div class="footer-links">
      <a href="mentions-legales.html">Mentions Légales</a>
      <a href="politique-confidentialite.html">Politique de Confidentialité</a>
    </div>
  </div>
</div>

<!-- PAGE À PROPOS -->
<div id="page-apropos" class="page">
    <div class="membre-card">
        <div class="membre-avatar">N</div>
        <div class="membre-nom">Nils</div>
        <p>Fondateur de ScentFinder</p>
    </div>
</div>

<script>
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + pageId).classList.add('active');
}
</script>

</body>
</html>
