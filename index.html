<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScentFinder — Comparateur de Parfums de Prestige</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* [Tes styles CSS d'origine restent ici sans aucun changement] */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bx: #6B1A2A; --bxd: #4a0f1c; --bxl: #8B2438;
            --or: #C9A84C; --orl: #e8d5a3;
            --cr: #fdf8f2; --crd: #f5ede0;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--cr); color: var(--bx); line-height: 1.5; overflow-x: hidden; }
        
        .nav { background: var(--cr); border-bottom: 0.5px solid var(--orl); padding: 0.8rem 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .logo-wrap { display: flex; align-items: center; gap: 0.85rem; cursor: pointer; }
        .logo-oval { width: 48px; height: 58px; border: 1px solid var(--bx); border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--cr); }
        .ls { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: var(--bx); }
        .lf { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-style: italic; color: var(--or); }
        .logo-text .ln { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 600; color: var(--bx); letter-spacing: 4px; }
        .logo-text .lt { font-size: 8px; color: var(--or); letter-spacing: 3px; }

        .nav-links { display: flex; gap: 0.4rem; }
        .nav-btn { background: transparent; border: 0.5px solid var(--orl); color: var(--bx); padding: 0.4rem 1rem; border-radius: 50px; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; letter-spacing: 1px; }
        .nav-btn:hover, .nav-btn.active { background: var(--bx); color: var(--or); border-color: var(--bx); }

        .page { display: none; min-height: 80vh; }
        .page.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .hero { background: var(--bxd); padding: 3rem 2rem; display: flex; flex-direction: column; align-items: center; gap: 1rem; text-align: center; border-bottom: 1px solid var(--or); }
        .hero-eyebrow { font-size: 9px; color: var(--or); letter-spacing: 5px; text-transform: uppercase; }
        .hero-title { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 400; color: var(--cr); line-height: 1.2; }
        .hero-title em { color: var(--or); font-style: italic; }
        .hero-divider { display: flex; align-items: center; gap: 10px; width: 180px; }
        .hero-divider span { flex: 1; height: 0.5px; background: var(--or); opacity: 0.4; }
        .hero-sub { font-size: 12px; color: #a08070; letter-spacing: 2px; }

        .search-wrap { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.03); border: 0.5px solid var(--or); border-radius: 50px; padding: 0.75rem 1.5rem; width: 100%; max-width: 500px; margin-top: 1rem; transition: all 0.3s; }
        .search-wrap:focus-within { background: rgba(255,255,255,0.08); border-color: var(--orl); box-shadow: 0 0 20px rgba
